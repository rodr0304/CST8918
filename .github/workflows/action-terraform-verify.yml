name: Terraform Verification

on:
  pull_request:
    branches:
      - main
      - master

permissions:
  id-token: write
  contents: read

jobs:
  terraform-fmt:
    runs-on: ubuntu-latest
    name: Terraform Format Check

    outputs:
      CHECK_STATUS: ${{ env.CHECK_STATUS }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Fetch changed files
        id: pr_files
        uses: jitterbit/get-changed-files@v1
        with:
          format: space-delimited

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.2.4

      - name: Check terraform fmt
        run: |
          set +e

          echo "CHECK_STATUS=0" >> $GITHUB_ENV

          for changed_file in ${{ steps.pr_files.outputs.added_modified }}; do
            if [[ "$changed_file" == *.tf ]]; then
              terraform fmt -check "$changed_file"

              if [[ $? -ne 0 ]]; then
                echo "CHECK_STATUS=1" >> $GITHUB_ENV
              fi
            fi
          done

      - name: Finish
        if: always()
        run: exit $CHECK_STATUS

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Lab-A09/infrastructure

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.2.4

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  tflint:
    name: TFLint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Lab-A09/infrastructure

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.2.4

      - uses: terraform-linters/setup-tflint@v4

      - run: terraform init -backend=false

      - run: tflint --init

      - run: tflint
